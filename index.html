<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jeu Positions Deluxe</title>
  <style>
    :root { --bg:#070707; --green:#00ff88; --pink:#ff1493; }
    body { background: var(--bg); color: white; font-family: sans-serif; text-align: center; margin: 0; padding: 20px; }
    .box { background: #1a1a1a; padding: 30px; border-radius: 30px; border: 1px solid rgba(255,255,255,.1); max-width: 500px; margin: 50px auto; }
    h1 { background: linear-gradient(90deg, var(--pink), #00e5ff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-size: 3rem; }
    input { width: 90%; padding: 15px; margin: 10px 0; border-radius: 15px; border: none; background: #222; color: white; }
    button { padding: 20px 40px; background: var(--green); border: none; border-radius: 50px; font-weight: 900; font-size: 1.5rem; cursor: pointer; box-shadow: 0 0 30px rgba(0,255,136,.4); }
    #game { display: none; }
  </style>
</head>
<body>
<div class="box" id="setup">
  <h1>Positions Deluxe</h1>
  <input type="text" id="p1" placeholder="Joueur 1">
  <input type="text" id="p2" placeholder="Joueur 2">
  <button onclick="lancer()">LANCER LE JEU</button>
</div>
<div id="game">
  <h1 style="margin-top:100px;">🔥 PARTIE EN COURS 🔥</h1>
</div>
<script>
function lancer() {
  document.getElementById('setup').style.display = 'none';
  document.getElementById('game').style.display = 'block';
}
</script>
</body>
</html>
