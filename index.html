<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Jeu Positions Deluxe</title>
  <style>
    :root { --bg:#070707; --green:#00ff88; }
    body { background: var(--bg); color: white; font-family: sans-serif; text-align: center; padding: 20px; }
    .panels { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 15px; margin-top: 30px; }
    .panel { padding: 30px 15px; border: 4px solid; border-radius: 25px; font-weight: 900; transition: all 0.3s ease; opacity: 1; }
    .dimmed { opacity: 0.1; }
    .glitter { border-color: gold !important; transform: scale(1.05); }
    button { padding: 20px 40px; background: var(--green); border-radius: 50px; font-weight: 900; cursor: pointer; border: none; }
  </style>
</head>
<body>

<div id="setup">
  <h1>Jeu Positions</h1>
  <input type="text" id="p1" placeholder="J1"> <input type="text" id="p2" placeholder="J2">
  <input type="text" id="p3" placeholder="J3"> <input type="text" id="p4" placeholder="J4">
  <button onclick="lancerJeu()">COMMENCER</button>
</div>

<div id="game" style="display:none;">
  <button id="spinBtn" onclick="tourner()">1. LANCER LES CADRANS</button>
  <div class="panels">
    <div class="panel" id="pan1" style="border-color:#ff1493">👅 BOUCHE<br><span id="c1">00</span></div>
    <div class="panel" id="pan2" style="border-color:#00e5ff">❌ SANS<br><span id="c2">00</span></div>
    <div class="panel" id="pan3" style="border-color:#b26cff">👥 GROUPE<br><span id="c3">00</span></div>
    <div class="panel" id="pan4" style="border-color:#ff9f43">🎲 DIVERS<br><span id="c4">00</span></div>
  </div>
  <button id="potionBtn" style="display:none; background:#ffd54a;" onclick="tirerPotion()">2. LANCER POTION</button>
  <div class="panel" id="pan5" style="border-color:#ffd54a; width:150px; margin:20px auto;">🧪 POTION<br><span id="c5">?</span></div>
</div>

<script>
let winRes = {name: "69", url: "https://gaysexpositions.guide/69/"};
let active = [1, 2, 4];

function lancerJeu() {
  if(document.getElementById('p3').value || document.getElementById('p4').value) active.push(3);
  document.getElementById('setup').style.display = 'none';
  document.getElementById('game').style.display = 'block';
}

async function tourner() {
  document.getElementById('spinBtn').disabled = true;
  let wIdNum = active[Math.floor(Math.random()*active.length)];
  
  for(let i=0; i<15; i++) {
    active.forEach(j => document.getElementById('c'+j).innerText = Math.floor(Math.random()*9));
    await new Promise(r => setTimeout(r, 100));
  }
  
  for(let j of active) {
    if(j !== wIdNum) document.getElementById('pan'+j).classList.add('dimmed');
    else document.getElementById('pan'+j).classList.add('glitter');
    await new Promise(r => setTimeout(r, 400));
  }
  document.getElementById('potionBtn').style.display = 'inline-block';
}

function tirerPotion() {
  document.getElementById('c5').innerText = Math.random() > 0.5 ? "AVEC" : "SANS";
  document.getElementById('pan5').classList.add('glitter');
  if(confirm("Gagné : " + winRes.name + ". Ouvrir le lien ?")) window.open(winRes.url, "_blank");
}
</script>
</body>
</html>
