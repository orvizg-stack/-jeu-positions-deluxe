<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jeu Positions</title>
<style>
  body { background: #070707; color: white; font-family: sans-serif; text-align: center; padding: 20px; }
  .setup-box { background: #1a1a1a; padding: 30px; border-radius: 20px; max-width: 500px; margin: auto; }
  input { width: 90%; padding: 10px; margin: 10px 0; border-radius: 10px; border: none; }
  button { padding: 15px 30px; background: #00ff88; border: none; border-radius: 20px; font-weight: bold; cursor: pointer; }
</style>
</head>
<body>
<div id="setupPopup" class="setup-box">
  <h1>Jeu Positions Deluxe</h1>
  <select id="playerCount">
    <option value="2">2 joueurs</option>
    <option value="3">3 joueurs</option>
    <option value="4">4 joueurs</option>
  </select><br>
  <input type="text" id="setupP1" placeholder="Joueur 1">
  <input type="text" id="setupP2" placeholder="Joueur 2">
  <input type="text" id="setupP3" placeholder="Joueur 3 (optionnel)">
  <input type="text" id="setupP4" placeholder="Joueur 4 (optionnel)"><br>
  <button onclick="lancerJeu()">Commencer la partie</button>
</div>

<div id="gameShell" style="display:none;">
  <h1>Partie en cours 🔥</h1>
  <button onclick="location.reload()">Nouvelle partie</button>
</div>

<script>
function lancerJeu() {
  const count = parseInt(document.getElementById('playerCount').value);
  const p1 = document.getElementById('setupP1').value.trim();
  const p2 = document.getElementById('setupP2').value.trim();
  
  // Validation corrigée : vérifie juste que les deux premiers sont là
  if(p1 !== "" && p2 !== "") {
      document.getElementById('setupPopup').style.display = 'none';
      document.getElementById('gameShell').style.display = 'block';
      alert("C'est parti !");
  } else {
      alert("Erreur : Remplis au moins le Joueur 1 et le Joueur 2.");
  }
}
</script>
</body>
</html>
