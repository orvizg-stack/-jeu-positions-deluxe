<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jeu Positions Deluxe</title>
  <style>
    :root { --bg:#070707; --green:#00ff88; }
    body { background: var(--bg); color: white; font-family: sans-serif; text-align: center; padding: 20px; }
    .box { background: #1a1a1a; padding: 30px; border-radius: 30px; border: 1px solid rgba(255,255,255,.1); max-width: 500px; margin: 20px auto; }
    input { display: block; width: 90%; padding: 15px; margin: 10px auto; border-radius: 10px; border: none; background: #333; color: white; }
    button { padding: 20px 40px; background: var(--green); border-radius: 50px; font-weight: 900; cursor: pointer; border: none; margin: 10px; }
    .panels { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; margin-top: 30px; }
    .panel { padding: 20px; border: 4px solid; border-radius: 20px; font-weight: 900; transition: all 0.3s; }
    .dimmed { opacity: 0.1; }
    .glitter { border-color: gold !important; transform: scale(1.05); }
  </style>
</head>
<body>

<div class="box" id="setup">
  <h1>Jeu Positions</h1>
  <input type="text" id="p1" placeholder="Joueur 1">
  <input type="text" id="p2" placeholder="Joueur 2">
  <input type="text" id="p3" placeholder="Joueur 3">
  <input type="text" id="p4" placeholder="Joueur 4">
  <button onclick="lancerJeu()">COMMENCER</button>
</div>

<div id="game" style="display:none;">
  <button id="spinBtn" onclick="tourner()">1. LANCER LES CADRANS</button>
  <div class="panels">
    <div class="panel" id="pan1" style="border-color:#ff1493">👅 BOUCHE<br><span id="c1">00</span></div>
    <div class="panel" id="pan2" style="border-color:#00e5ff">❌ SANS<br><span id="c2">00</span></div>
    <div class="panel" id="pan3" style="border-color:#b26cff">👥 GROUPE<br><span id="c3">00</span></div>
    <div class="panel" id="pan4" style="border-color:#ff9f43">🎲 DIVERS<br><span id="c4">00</span></div>
  </div>
  <button id="potionBtn" style="display:none; background:#ffd54a;" onclick="tirerPotion()">2. LANCER POTION</button>
  <div class="panel" id="pan5" style="border-color:#ffd54a; width:150px; margin:20px auto;">🧪 POTION<br><span id="c5">?</span></div>
</div>

<script>
let winRes = null;
let winData = null;

function lancerJeu() {
  document.getElementById('setup').style.display = 'none';
  document.getElementById('game').style.display = 'block';
}

async function tourner() {
  document.getElementById('spinBtn').disabled = true;
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('dimmed', 'glitter'));
  
  let p3 = document.getElementById('p3').value.trim();
  let active = p3 ? [1,2,3,4] : [1,2,4];
  let wIdNum = active[Math.floor(Math.random()*active.length)];
  let wNum = "01";
  winData = { cat: document.getElementById('pan'+wIdNum).innerText.split('\n')[0], num: wNum, url: "https://gaysexpositions.guide/69/" };
  
  for(let i=0; i<10; i++) {
    active.forEach(j => document.getElementById('c'+j).innerText = Math.floor(Math.random()*9));
    await new Promise(r => setTimeout(r, 100));
  }
  
  document.querySelectorAll('.panel').forEach(p => { 
    if(p.id !== 'pan'+wIdNum && p.id !== 'pan5') p.classList.add('dimmed'); 
    else if(p.id !== 'pan5') p.classList.add('glitter'); 
  });
  document.getElementById('c'+wIdNum).innerText = wNum;
  document.getElementById('potionBtn').style.display = 'inline-block';
}

function tirerPotion() {
  let potion = Math.random() > 0.5 ? "AVEC" : "SANS";
  document.getElementById('c5').innerText = potion;
  document.getElementById('pan5').classList.add('glitter');
  
  setTimeout(() => {
    if(confirm(`RÉSUMÉ:\nCatégorie: ${winData.cat}\nNuméro: ${winData.num}\nPotion: ${potion}\n\nOuvrir la position ?`)) {
      window.open(winData.url, "_blank");
    }
    setTimeout(() => location.reload(), 1000);
  }, 500);
}
</script>
</body>
</html>
