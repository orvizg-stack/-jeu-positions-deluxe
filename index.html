<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Jeu Positions Deluxe</title>
  <style>
    :root { --bg:#070707; --green:#00ff88; }
    body { background: var(--bg); color: white; font-family: sans-serif; text-align: center; padding: 20px; }
    .box { background: #1a1a1a; padding: 30px; border-radius: 30px; border: 1px solid rgba(255,255,255,.1); max-width: 500px; margin: 20px auto; }
    button { padding: 20px; background: var(--green); border: none; border-radius: 50px; font-weight: 900; cursor: pointer; }
    .panels { display: grid; grid-template-columns: repeat(auto-fit, minmax(100px, 1fr)); gap: 10px; margin-top: 20px; }
    .panel { padding: 15px; border: 3px solid; border-radius: 15px; font-weight: 900; transition: all 0.5s ease; }
    .dimmed { opacity: 0.1; }
    .glitter { animation: glitter 0.3s infinite alternate; }
    @keyframes glitter { from { border-color: white; transform: scale(1); } to { border-color: gold; transform: scale(1.05); } }
  </style>
</head>
<body>
<div class="box" id="setup">
  <h1>Jeu Positions</h1>
  <button onclick="lancerJeu()">COMMENCER</button>
</div>
<div id="game" style="display:none;">
  <button id="spinBtn" onclick="tourner()">LANCER</button>
  <div class="panels">
    <div class="panel" id="p1" style="border-color:#ff1493">👅<br><span id="c1">00</span></div>
    <div class="panel" id="p2" style="border-color:#00e5ff">❌<br><span id="c2">00</span></div>
    <div class="panel" id="p3" style="border-color:#b26cff">👥<br><span id="c3">00</span></div>
    <div class="panel" id="p4" style="border-color:#ff9f43">🎲<br><span id="c4">00</span></div>
    <div class="panel" id="p5" style="border-color:#ffd54a">🧪<br><span id="c5">00</span></div>
  </div>
</div>

<script>
const db = {
  "p1": { "01": {name:"69", url:"https://gaysexpositions.guide/69/"}, "02": {name:"69 Kneeling", url:"https://gaysexpositions.guide/kneeling-69/"} },
  "p2": { "01": {name:"Afternoon Delight", url:"https://gaysexpositions.guide/afternoon-delight/"}, "02": {name:"Arch", url:"https://gaysexpositions.guide/arch/"} },
  "p3": { "01": {name:"369", url:"https://gaysexpositions.guide/fr/369/"}, "02": {name:"469", url:"https://gaysexpositions.guide/fr/469/"} },
  "p4": { "01": {name:"Massage du cul", url:"https://gaysexpositions.guide/"}, "02": {name:"Creampie", url:"https://gaysexpositions.guide/"} },
  "p5": { "01": {name:"Potion", url:"https://gaysexpositions.guide/"} }
};

function lancerJeu() {
  document.getElementById('setup').style.display = 'none';
  document.getElementById('game').style.display = 'block';
}

async function tourner() {
  document.getElementById('spinBtn').disabled = true;
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('dimmed', 'glitter'));
  
  let winnerId = "p" + (Math.floor(Math.random()*5) + 1);
  let winnerNum = "0" + (Math.floor(Math.random()*2) + 1);
  
  // Animation de défilement
  for(let i=0; i<15; i++) {
    for(let j=1; j<=5; j++) document.getElementById('c'+j).innerText = Math.floor(Math.random()*10);
    await new Promise(r => setTimeout(r, 80));
  }
  
  // Éteindre les perdants et scintiller le gagnant
  document.querySelectorAll('.panel').forEach(p => {
    if(p.id !== winnerId) p.classList.add('dimmed');
    else p.classList.add('glitter');
  });
  
  document.getElementById('c'+winnerId.slice(1)).innerText = winnerNum;
  
  setTimeout(() => {
    let res = db[winnerId][winnerNum];
    if(confirm("Gagné : " + res.name + ". Ouvrir le lien ?")) window.open(res.url, "_blank");
    document.getElementById('spinBtn').disabled = false;
  }, 500);
}
</script>
</body>
</html>
