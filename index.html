<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Jeu Positions Deluxe</title>
  <style>
    :root { --bg:#070707; --pink:#ff1493; --cyan:#00e5ff; --violet:#b26cff; --orange:#ff9f43; --gold:#ffd54a; --green:#00ff88; }
    body { background: var(--bg); color: white; font-family: sans-serif; text-align: center; padding: 20px; margin: 0; }
    .box { background: #1a1a1a; padding: 30px; border-radius: 30px; border: 1px solid rgba(255,255,255,.1); max-width: 500px; margin: 20px auto; }
    input { width: 85%; padding: 20px; margin: 10px 0; border-radius: 15px; border: none; background: #333; color: white; font-size: 1.1rem; }
    button { padding: 20px 40px; background: var(--green); border: none; border-radius: 50px; font-weight: 900; font-size: 1.3rem; cursor: pointer; box-shadow: 0 0 20px rgba(0,255,136,.4); margin: 10px; }
    .panels { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 15px; margin-top: 30px; }
    .panel { padding: 30px 15px; border: 4px solid; border-radius: 25px; font-weight: 900; font-size: 1.2rem; transition: all 0.5s ease; min-height: 150px; opacity: 1; }
    .dimmed { opacity: 0.1; }
    .glitter { animation: glitter 0.3s infinite alternate; }
    @keyframes glitter { from { border-color: white; transform: scale(1); } to { border-color: gold; transform: scale(1.05); } }
  </style>
</head>
<body>

<div class="box" id="setup">
  <h1>Jeu Positions</h1>
  <input type="text" id="p1" placeholder="Joueur 1">
  <input type="text" id="p2" placeholder="Joueur 2">
  <input type="text" id="p3" placeholder="Joueur 3 (Optionnel)">
  <input type="text" id="p4" placeholder="Joueur 4 (Optionnel)">
  <button onclick="lancerJeu()">COMMENCER</button>
</div>

<div id="game" style="display:none;">
  <button id="spinBtn" onclick="tourner()">1. LANCER POSITION</button>
  <div class="panels">
    <div class="panel" id="pan1" style="border-color:#ff1493">👅 BOUCHE<br><span id="c1">00</span></div>
    <div class="panel" id="pan2" style="border-color:#00e5ff">❌ SANS<br><span id="c2">00</span></div>
    <div class="panel" id="pan3" style="border-color:#b26cff">👥 GROUPE<br><span id="c3">00</span></div>
    <div class="panel" id="pan4" style="border-color:#ff9f43">🎲 DIVERS<br><span id="c4">00</span></div>
  </div>
  <button id="potionBtn" style="background:#ffd54a; display:none;" onclick="tirerPotion()">2. LANCER POTION</button>
  <div class="panel" id="pan5" style="border-color:#ffd54a; width:200px; margin:20px auto;">🧪 POTION<br><span id="c5">?</span></div>
</div>

<script>
let winRes = null;
let activePanels = [1, 2, 4];

function lancerJeu() {
  const p3 = document.getElementById('p3').value.trim();
  const p4 = document.getElementById('p4').value.trim();
  if (p3 !== "" || p4 !== "") activePanels.push(3);
  else document.getElementById('pan3').classList.add('dimmed');
  
  document.getElementById('setup').style.display = 'none';
  document.getElementById('game').style.display = 'block';
}

async function tourner() {
  document.getElementById('spinBtn').disabled = true;
  let wId = activePanels[Math.floor(Math.random()*activePanels.length)];
  winRes = {name: "Position tirée", url: "https://gaysexpositions.guide/"};
  
  for(let i=0; i<10; i++) {
    activePanels.forEach(j => document.getElementById('c'+j).innerText = Math.floor(Math.random()*9));
    await new Promise(r => setTimeout(r, 100));
  }
  
  document.querySelectorAll('.panel').forEach(p => { 
    if(p.id !== 'pan'+wId && p.id !== 'pan5') p.classList.add('dimmed'); 
    else if(p.id !== 'pan5') p.classList.add('glitter'); 
  });
  document.getElementById('c'+wId).innerText = "01";
  document.getElementById('potionBtn').style.display = 'inline-block';
}

function tirerPotion() {
  document.getElementById('c5').innerText = Math.random() > 0.5 ? "AVEC" : "SANS";
  document.getElementById('pan5').classList.add('glitter');
  if(confirm("Gagné : " + winRes.name + ". Ouvrir le lien ?")) window.open(winRes.url, "_blank");
  setTimeout(() => location.reload(), 3000);
}
</script>
</body>
</html>
